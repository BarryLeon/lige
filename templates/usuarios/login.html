{% extends "layout_login.html" %}
{% load static %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div style="width:100%; max-width:400px;">

  <div class="card border-0 rounded-4 p-5"
       style="background-color: rgba(255,255,255,0.95);
              backdrop-filter: blur(10px);
              box-shadow: 0 20px 40px rgba(0,0,0,0.2);">

    <!-- Logo -->
    <div class="text-center mb-4">
      <img src="{% static 'img/logo.png' %}"
           alt="Logo"
           style="max-height:160px;">
    </div>

    <h5 class="text-center mb-4 fw-light text-secondary">
      Acceso al sistema
    </h5>

    <form method="post" novalidate>
      {% csrf_token %}

      <!-- Usuario -->
     <div class="mb-3 text-center">
  <label class="form-label small text-muted d-block">
    {{ form.username.label }}
  </label>
  {{ form.username }}
</div>

      <!-- Contraseña -->
      <div class=" mb-3 text-center">
  <label class="form-label small text-muted d-block">
    {{ form.password.label }}
  </label>
  {{ form.password }}
</div>

      {% if form.non_field_errors %}
      <div class="alert alert-danger text-center py-2">
        {{ form.non_field_errors }}
      </div>
      {% endif %}

      <div class="d-grid mt-4">
        <button type="submit"
                class="btn btn-secondary btn-lg rounded-3">
          Ingresar
        </button>
      </div>

      <input type="hidden" name="next" value="{{ next }}">
    </form>

  </div>

  <p class="text-center mt-4 text-white small">
    © 2026 LIGE
  </p>

</div>
{% endblock %}
